<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Garten Pro Sync</title>
    <style>
        :root { --primary: #2e7d32; --secondary: #1b5e20; --bg: #d7ccc8; }
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; }
        header { background: var(--primary); color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        #main-container { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 140px; background: #fff; border-right: 1px solid #ddd; padding: 10px; overflow-y: auto; }
        #garden-plot { flex: 1; position: relative; background-color: var(--bg); background-image: radial-gradient(#a1887f 1px, transparent 1px); background-size: 20px 20px; overflow: auto; touch-action: none; }
        .area { position: absolute; border: 3px solid #5d4037; background: #8b451366; min-width: 50px; min-height: 50px; }
        .area-selected { border-color: #ffeb3b !important; }
        button { width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 8px; border: 1px solid #ccc; font-weight: bold; }
        .btn-sync { background: #007bff; color: white; border: none; }
        .msg-box { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 80%; z-index: 100; }
        .alert { padding: 10px; border-radius: 8px; color: white; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

<header>
    <strong>Garten Sync</strong>
    <button onclick="syncWithGithub()" class="btn-sync" style="width:auto;">☁️ Cloud Save</button>
</header>

<div id="main-container">
    <div id="sidebar">
        <button onclick="addArea(150, 80)">📦 Neues Beet</button>
        <hr>
        <div id="plant-list">
            <button onclick="addPlant('Tomate', '#d32f2f')">Tomate</button>
            <button onclick="addPlant('Salat', '#689f38')">Salat</button>
            <button onclick="addPlant('Zwiebel', '#7b1fa2')">Zwiebel</button>
        </div>
        <hr>
        <!-- Konfiguration für GitHub (wird lokal im Browser gespeichert) -->
        <small>GitHub Settings:</small>
        <input type="password" id="ghToken" placeholder="GitHub Token" style="width:90%; font-size:10px;">
    </div>
    <div id="garden-plot"></div>
</div>

<div id="msg-box" class="msg-box"></div>

<script>
    // Konfiguration (bitte anpassen)
    const GH_USER = "DEIN_GITHUB_NAME";
    const GH_REPO = "DEIN_REPO_NAME";
    const GH_PATH = "gartenplan.json"; 

    let selectedArea = null;

    // GitHub Sync Logik
    async function syncWithGithub() {
        const token = document.getElementById('ghToken').value;
        if (!token) return notify("Bitte GitHub Token eingeben!", "red");

        const content = document.getElementById('garden-plot').innerHTML;
        const encodedContent = btoa(unescape(encodeURIComponent(content))); // Base64 Encoding

        notify("Verbinde mit GitHub...", "orange");

        try {
            // 1. Aktuelle Datei-Info holen (wichtig für den 'sha' Key)
            const getRes = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_PATH}`, {
                headers: { "Authorization": `token ${token}` }
            });
            const fileData = await getRes.json();
            const sha = fileData.sha;

            // 2. Datei hochladen/überschreiben
            const putRes = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_PATH}`, {
                method: "PUT",
                headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: "Gartenplan Update via App",
                    content: encodedContent,
                    sha: sha
                })
            });

            if (putRes.ok) {
                notify("Erfolgreich in GitHub gespeichert!", "green");
                localStorage.setItem('gh_token_saved', token); // Token lokal merken
            } else {
                notify("Fehler beim Speichern!", "red");
            }
        } catch (err) {
            notify("Netzwerkfehler!", "red");
            console.error(err);
        }
    }

    // Standard Funktionen (Beete, Drag etc.)
    function addArea(w, h) {
        const area = document.createElement('div');
        area.className = "area";
        area.style.width = w + 'px'; area.style.height = h + 'px';
        area.style.left = '20px'; area.style.top = '20px';
        area.onclick = (e) => { e.stopPropagation(); selectArea(area); };
        makeDraggable(area);
        document.getElementById('garden-plot').appendChild(area);
        selectArea(area);
    }

    function selectArea(area) {
        document.querySelectorAll('.area').forEach(a => a.classList.remove('area-selected'));
        selectedArea = area;
        selectedArea.classList.add('area-selected');
    }

    function addPlant(name, color) {
        if (!selectedArea) return notify("Beet wählen!", "orange");
        const chip = document.createElement('div');
        chip.style.cssText = `background:white; border-radius:10px; padding:2px 8px; margin:2px; font-size:11px; border:1px solid ${color}; display:inline-block;`;
        chip.innerText = name;
        selectedArea.appendChild(chip);
    }

    function makeDraggable(el) {
        let x_off = 0, y_off = 0, active = false, startX, startY;
        const start = (e) => {
            active = true;
            const t = e.type === "touchstart" ? e.touches[0] : e;
            startX = t.clientX - x_off; startY = t.clientY - y_off;
        };
        const move = (e) => {
            if (!active) return;
            const t = e.type === "touchmove" ? e.touches[0] : e;
            x_off = t.clientX - startX; y_off = t.clientY - startY;
            el.style.transform = `translate3d(${x_off}px, ${y_off}px, 0)`;
        };
        el.addEventListener("mousedown", start); el.addEventListener("touchstart", start);
        window.addEventListener("mousemove", move); window.addEventListener("touchmove", move, {passive:false});
        window.addEventListener("mouseup", () => active = false); window.addEventListener("touchend", () => active = false);
    }

    function notify(m, c) {
        const d = document.createElement('div');
        d.className = "alert"; d.style.background = c; d.innerText = m;
        document.getElementById('msg-box').appendChild(d);
        setTimeout(() => d.remove(), 3000);
    }

    window.onload = () => {
        const savedToken = localStorage.getItem('gh_token_saved');
        if (savedToken) document.getElementById('ghToken').value = savedToken;
    };
</script>
</body>
</html>
